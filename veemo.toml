[backend]
kind = "inksight"
base_url = "https://www.inksight.site"
request_timeout_seconds = 30
heartbeat_enabled = true
heartbeat_interval_seconds = 600

[device]
name = "veemo-rpi3b-plus"
mac_override = "B8:27:EB:14:4F:48"
refresh_minutes = 60
full_refresh_every = 8
skip_unchanged_frames = true

[display]
model = "waveshare_epd_4in2_v2"
width = 400
height = 300
fast_mode = true
sleep_after_render = false

[logging]
level = "INFO"
